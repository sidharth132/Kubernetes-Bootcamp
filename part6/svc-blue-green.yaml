apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx
    version: blue   # 👈 initially blue
  ports:
  - port: 80
    targetPort: 80



Switch Traffic (Blue → Green)
    kubectl patch service nginx-service -p '{"spec":{"selector":{"app":"nginx","version":"green"}}}'
